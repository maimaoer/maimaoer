  Keyboard_letter: {label: abc, functional: true, send: Eisu_toggle, select: letter}
  Keyboard_default: {label: "ic@close", functional: false, send: Eisu_toggle, select: .default}
  Keyboard_switch: {label: 键盘, functional: true, send: Eisu_toggle, select: .next}
  Keyboard_number: {label: 123, preview: "\uE012", functional: true, send: Eisu_toggle, select: number}
  Keyboard_numberb: {label: "\uE1C1", functional: false, send: Eisu_toggle, select: numberb}
  Keyboard_symbols: {label: "\uE01C", functional: false, send: Eisu_toggle, select: symbols}
  Keyboard_next: {label: 后退, functional: false, send: Eisu_toggle, select: .next}
  Keyboard_last: {label: "\uE031", functional: false, send: Eisu_toggle, select: .last}
  Keyboard_last_lock: {label: "\uE073", send: Eisu_toggle, select: .last_lock}
  menu_keyboard: {label: "\uE03E", send: function, command: menu_keyboard}
  clipboard_window: {label: "\uE099", send: function, command: "clipboard_window"}
  set_color_default: {label: 标配, send: function, command: set_color_scheme, option: "default"}
  set_color_glass: {label: 玻璃, send: function, command: set_color_scheme, option: "glass"}
  set_theme: {label: "\uE189", send: function, command: set_theme, option: ""} #空参数刷新主题
