  VOLUME_DOWN: {label: 音量-, send: VOLUME_DOWN}
  VOLUME_UP: {label: 音量+, send: VOLUME_UP}
  VOLUME_MUTE: {label: 静音, send: VOLUME_MUTE}
  
  # 编辑
  Shift_L: {label: "\uE1B2", functional: true, send: Shift_L, shift_lock: long} #long中英状态长按锁定｜ascii_long英文長按中文單按鎖定｜click單按鎖定
  Shift_L2: {label: "\uE186", functional: true, send: Shift_L, shift_lock: long}
  Shift_L3: {functional: true, send: Shift_L, shift_lock: click} #供双击使用，仅shift_lock: click支持双击
  Return: {label: "\uE034", functional: false, send: Return}
  Return1: {label: "\uE030",  functional: false, send: Return}
  Hide: {label: "\uE0D7", send: BACK}
  BackSpace: {label: "\uE040", repeatable: true, functional: true, slide_delete: false, send: BackSpace}
  space: {label: "\uE183", repeatable: false, preview: "\uE182", functional: false, slide_cursor: true, send: space}
  space1: {label: "\uE182", repeatable: false, functional: true, slide_cursor: true, send: space}
  Clear: {label: "\uE048", text: "{Control+a}{BackSpace}"}
  Escape: {label: "\uE045", functional: false, send: Escape}
  Home: {label: "\uE0c5", send: Control+Home, functional: false}
  End: {label: "\uE0d5", send: Control+End, functional: false}
  Page_Up: {label: "\uE0cd", send: Page_Up, functional: false}
  Page_Down: {label: "\uE0dd", send: Page_Down, functional: false}
  Left1: {label: '⇦', send: Control+Left, repeatable: true, functional: false}
  Right1: {label: '⇨', send: Control+Right, repeatable: true, functional: false}
  Left: {label: '←', send: Left, repeatable: true, functional: false}
  Down: {label: '↓', send: Down, repeatable: true, functional: false}
  Up: {label: '↑', send: Up, repeatable: true, functional: false}
  Right: {label: '→', send: Right, repeatable: true, functional: false}
  select_all: {label: "☑", functional: false, send: Control+a}
  cut: {label: "✁", functional: false, send: Control+x}
  copy: {label: "❐", functional: false, send: Control+c}
  paste: {label: "⎗", functional: false, send: Control+v}
  redo: {label: "\uE18D", functional: false, send: Control+Shift+z} #>=Android 6.0
  undo: {label: "\uE18E", functional: false, send: Control+z} #>=Android 6.0
  Tab: {label: Tab, repeatable: false, text: '	'}
  Insert: {label: ⌤, send: Insert}
  Delete: {label: ⌦, send: Delete, functional: false}
  RepeatCommit: {label: "\uE18A", command: commit, option: "%1$s"}   #重复输入上屏内容
  delimiter: {label: 分词, text: "'"}
  select_cut: {label: ☑✁, text: '{Control+a}{cut}'}
  select_copy: {label: ☑❐, text: '{Control+a}{copy}'}
  Forward: {label: 前移, send: Control+j}
  Backward: {label: 后移, send: Control+k}
  Pin: {label: 置顶, send: Control+p}
  Reset: {label: 重置, send: Control+l}
  无能键: {send: ""}

  # rime组合键
  F4: {label: 方案菜单, send: F4}
  BackToPreviousSyllable: {label: 删音节, send: Control+BackSpace}
  CommitRawInput: {label: 编码, send: Control+Return} #上屏原始输入
  CommitScriptText: {label: 编码, send: Shift+Return} #上屏变换后输入
  CommitComment: {label: 编码, send: Control+Shift+Return} #上屏候选项备注
  DeleteCandidate: {label: 删词, send: Control+Delete, functional: false}
  
  #切换键盘
