  wubi86_double_key_scheme: {label: "\uE109", send: Shift+Control+8}  #一键切双键五笔方案
  pinyin_jiugong_scheme: {label: "\uE10E", send: Shift+Control+9}  #一键切九宫拼音方案

  # rime状态
  Mode_switch0: {toggle: ascii_mode, functional: true, send: Mode_switch, states: [123, 中]}
  Mode_switch: {toggle: ascii_mode, functional: false, send: Mode_switch, states: [中, En]}
  Zenkaku_Hankaku: {toggle: full_shape, send: Mode_switch, states: [半角, 全角]}
  Henkan: {toggle: simplification, send: Mode_switch, states: [汉字, 漢字]}
  Charset_switch: {toggle: charset_filter, send: Mode_switch, states: [常用, 扩展]}
  Punct_switch: {toggle: ascii_punct, send: Mode_switch, states: [。，, ．，]}
  orientation_switch: {toggle: _linear, send: Mode_switch, states: [纵向, 横向]}
  Spell_switch: {toggle: 86wubi_spelling, send: Mode_switch, states: [拆, 扌斥]}

