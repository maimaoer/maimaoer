  Deploy: {label: "\uE18B", send: function, command: apply, option: "DEPLOY"}
  Sync: {label: 同步, send: function, command: apply, option: "SYNC_USER_DATA"}
  UpdateConfig: {label: "\uE196", send: function, command: apply, option: "UPDATE_CONFIG"}
  
