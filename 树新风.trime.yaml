# Trime default style settings
# encoding: utf-8

config_version: "4.4"    #版本号
name: "树新风"        #方案名称
author: "讲文明"       #作者信息

#颜色
colors:
  1: &color1 0xff000000   #黑
  2: &color2 0xffffffff      #白
  3: &color3 0xffe1e3e7   #浅灰
  4: &color4 0xffacb2c2   #中灰
  5: &color5 0xff838383   #深灰
  6: &color6 0xff3266a0   #深蓝
  7: &color7 0x00         #透明
  8: &color8 0xff0080ff    #亮蓝
  9: &color9 gl.9.png      #玻璃绿
  10: &color10 bl.9.png    #玻璃
#配色方案
preset_color_schemes:
  default:
    name: "标配"
    dark_scheme: glass
    keyboard_back_color: *color3 #键盘背景
  #按键
    key_border_color: *color3 #按键边框
    key_text_color: *color1 #按键文本
    key_symbol_color: *color5 #按键符号
    key_back_color: bai.9.png #按键背景
    hilited_key_text_color: *color1 #高亮按键文本
    hilited_key_symbol_color: *color5 #高亮按键符号
    hilited_key_back_color: *color2 #高亮按键背景
  #功能键
    off_key_text_color: *color1 #功能键文本
    off_key_back_color: hui.9.png  #功能键背景
    on_key_back_color: *color4 #功能键锁定背景
    on_key_text_color: *color1 #功能键锁定文本
    hilited_off_key_text_color: *color1 #高亮键文本
    hilited_off_key_back_color: *color4 #高亮键背景
  #回车键
    rbc: lan.9.png   #回车背景
    rhbc: *color6   #回车高亮背景
    rtc: *color2     #回车文字颜色
    rhtc: *color2    #回车高亮文字
  #编码
    text_color: *color8 #编码
    text_back_color: *color2 #编码区&悬浮窗背景
    hilited_text_color: *color8 #高亮编码
    hilited_back_color: *color2 #高亮编码背景
  #候选
    back_color: *color3 #候选区背景
    candidate_separator_color: *color3 #候选分割线
    candidate_text_color: *color1 #候选文本
    label_color: *color4 #候选序号
    hilited_candidate_back_color: *color8 #高亮背景
    hilited_candidate_text_color: *color2 #高亮文本
    comment_text_color: *color4 #提示
    hilited_comment_text_color: *color1 #高亮提示
  #气泡
    popup_back_color: *color3 #气泡背景
    hilited_popup_back_color: *color2 #高亮气泡背景
    hilited_popup_text_color: *color8 #高亮气泡文字

  glass:
    name: "玻璃"
    light_scheme: default
    __include: /preset_color_schemes/default
    __patch: 
      keyboard_back_color: d.png #键盘背景
      key_back_color: bbl.9.png #按键背景
      hilited_key_back_color: *color9 #高亮按键背景
      off_key_text_color: *color1 #功能键文本
      off_key_back_color: *color10 #功能键背景
      on_key_back_color: *color9 #功能键锁定背景
      hilited_off_key_back_color: *color9  #高亮功能键背景
      rbc: *color10   #回车背景
      rhbc: *color9   #回车高亮背景
      rtc: *color8     #回车文字颜色
      rhtc: *color8    #回车高亮文字

# 最好保留一项，防止其他主题使用 __include 时无法加载
fallback_colors:   #后备配色
  candidate_background: key_back_color #候选栏背景
 # root_background: keyboard_back_color # 整个键盘区+候选栏的背景图/色
#  long_text_back_color: text_back_color #长文本按键的背景(剪贴板）

#界面风格、功能开关
style:
#候选
  candidate_text_size: 20  #候选字号
  candidate_padding: 14  #候选项内边距
  candidate_spacing: 1    #候选间隔
  candidate_view_height: 26 #候选区高度
  candidate_corner_radius: 10 #候选背景块圆角半径
  candidate_text_vertical_bias: 0.4 #候选垂直偏移位置（仅 overlay 模式使用，需要间隙空间足够，范围 0.0~1.0，0.0=top，0.5=center，1.0=bottom）
#提示
  comment_text_size: 9 #提示字号
  comment_height: 14 #（调节候选上下空间）
  comment_position: overlay #位置：right/top/overlay
  comment_vertical_bias: 1.0 #提示垂直偏移位置（仅 overlay 模式使用，需要间隙空间足够，范围 0.0~1.0，0.0=top，0.5=center，1.0=bottom）
#按键
  key_width: 10 #键宽
  key_height: 40 #键高
  key_text_size: 22 #键字号
  symbol_text_size: 11 #符号字号
  key_long_text_size: 19 #长标签字号
  key_border: 1 #边框宽度
  round_corner: 12 #按键圆角半径
  shadow_radius: 0 #按键文字阴影
  key_text_offset_x: 0 #按键文字左右偏移
  key_text_offset_y: 0 #按键文字上下偏移
  key_symbol_offset_x: 10 #上标左右偏移
  key_symbol_offset_y: 5 #上标上下偏移
  key_hint_offset_x: 0 #下标左右偏移
  key_hint_offset_y: -3 #下标上下偏移
  key_press_offset_x: 2 #按下横向偏移
  key_press_offset_y: 2 #按下纵向偏移
#键盘
  reset_ascii_mode_on_focus_change: false #焦点变更弹起输入法软键盘时，重置 ascii_mode
  horizontal_gap: 2 #按键间距
  vertical_gap: 3 #按键行距
  keyboard_height: 250 #锁定键盘高度
  keyboard_height_land: 220 #锁定横屏键盘高度
  keyboard_padding_bottom: 15  #竖屏底边距
  keyboard_padding_land_bottom: 8 #横屏底边距
  keyboard_padding: 0    #竖屏两侧边距
  keyboard_padding_land: 70  #横屏两侧边距
#字体
  key_font: [iconfont.ttf] #键盘字体
  symbol_font: [iconfont.ttf] #符号字体
  popup_font: [iconfont.ttf] #气泡字体
#气泡
  popup_width: 45 #气泡宽度
  popup_height: 45 #preview气泡高度
  popup_key_height: 47 #内键气泡高度
  popup_bottom_margin: 73 #气泡标高
  popup_text_size: 25 #气泡字号

#预编辑文本
preedit:                   # 预编辑文本视图参数
  horizontal_padding: 8    # 横向内边距（整数）
  alpha: 1                # 透明度（0-1，浮点）
  top_end_radius: 5       # 末上端圆角（浮点）
  foreground:             # 前景样式
    font_size: 16          # 预编辑字体大小（浮点）
 
#悬浮窗
window:
  insets:                    # 窗口内边距
    vertical: 4              # 纵向内边距（整数）
    horizontal: 6            # 横向内边距（整数）
  item_padding:            # 候选项内边距
    vertical: 6              # 纵向内边距（整数）
    horizontal: 6           # 横向内边距（整数）
#  min_width: 0           # 最小宽度（整数）
  corner_radius: 10          # 圆角半径（浮点）
  alpha: 1                  # 透明度（0-1，浮点）
  foreground:               # 前景样式
    label_font_size: 15      # 序号字体大小（浮点）
    text_font_size: 20       # 文字字体大小（浮点）
    comment_font_size: 12  # 注释字体大小（浮点）

tool_bar:
  button_spacing: 12 # 按钮间距
  button_font: [iconfont.ttf] # 按钮字体
  back_style: "\uE0A7" # 剪贴板提示返回按钮样式
  # 左侧固定主按钮配置
  primary_button:
    size: [60, 40]      # 视图组件整体宽高 (支持: -1: 填充(matchParent), -2: 自适应(wrapContent))
    background:   # 背景样式设置
      type: rectangle     # 高亮形状 (可选: circle|rectangle)
      corner_radius: 8   # 圆角半径
      normal: *color7     # 正常状态背景颜色
      highlight: *color3  # 高亮状态背景色
      vertical_inset: 5      # 垂直方向内缩量
      horizontal_inset: 8    # 水平方向内缩量
    foreground:    # 前景内容设置
      style: ""    # （内置图标以ic@开头） 前景样式可以为空，使用默认样式，按钮将显示为 action 的 label
      normal: candidate_text_color  # 正常状态前景色 (本地图片不允许着色)
      # highlight:        # 高亮状态前景色
      padding: 8   # 前景内容与背景边界的内边距
      font_size: 23
    action: menu_keyboard   # 按钮点击事件
    long_press_action: Settings

  hide: &hide
    size: [56, 40]
    background:   # 背景样式设置
      type: rectangle     # 高亮形状 (可选: circle|rectangle)
      corner_radius: 8  # 圆角半径
      normal: *color7     # 正常状态背景颜色
      highlight: *color3   # 高亮状态背景色
      # vertical_inset: 0        # 垂直方向内缩量
      horizontal_inset: 10     # 水平方向内缩量
    foreground:
      style: ""
      padding: 1   # 前景内容与背景边界的内边距
      font_size: 32
    action: Hide

  bqfh3: &bqfh3
    size: [42, 40]
    background:   # 背景样式设置
      type: rectangle     # 高亮形状 (可选: circle|rectangle)
      corner_radius: 8   # 圆角半径
      normal: *color7      # 正常状态背景颜色
      highlight: *color3    # 高亮状态背景色
      # vertical_inset: 0         # 垂直方向内缩量
      # horizontal_inset: 0      # 水平方向内缩量
    foreground:
      style: "\uE018"
      padding: 9   # 前景内容与背景边界的内边距
      font_size: 21
    action: Keyboard_bqfh3
    long_press_action: Keyboard_symbols

  layout: &layout
    size: [42, 40]
    background:   # 背景样式设置
      type: rectangle     # 高亮形状 (可选: circle|rectangle)
      corner_radius: 8   # 圆角半径
      normal: *color7      # 正常状态背景颜色
      highlight: *color3    # 高亮状态背景色
      # vertical_inset: 0         # 垂直方向内缩量
      # horizontal_inset: 0      # 水平方向内缩量
    foreground:
      style: ""
      padding: 9   # 前景内容与背景边界的内边距
      font_size: 21
    action: Keyboard_layout
    long_press_action: Menu

  clip: &clip
    size: [42, 40]
    background:   # 背景样式设置
      type: rectangle     # 高亮形状 (可选: circle|rectangle)
      corner_radius: 8   # 圆角半径
      normal: *color7      # 正常状态背景颜色
      highlight: *color3    # 高亮状态背景色
      # vertical_inset: 0         # 垂直方向内缩量
      # horizontal_inset: 0      # 水平方向内缩量
    foreground:
      style: ""
      padding: 9   # 前景内容与背景边界的内边距
      font_size: 21
    action: clipboard_window

  redo: &redo
    size: [42, 40]
    background:   # 背景样式设置
      type: rectangle     # 高亮形状 (可选: circle|rectangle)
      corner_radius: 8   # 圆角半径
      normal: *color7      # 正常状态背景颜色
      highlight: *color3    # 高亮状态背景色
      # vertical_inset: 0         # 垂直方向内缩量
      # horizontal_inset: 5      # 水平方向内缩量
    foreground:
      style: ""
      padding: 8   # 前景内容与背景边界的内边距
      font_size: 22
    action: redo

  undo: &undo
    size: [42, 40]
    background:   # 背景样式设置
      type: rectangle     # 高亮形状 (可选: circle|rectangle)
      corner_radius: 8   # 圆角半径
      normal: *color7      # 正常状态背景颜色
      highlight: *color3    # 高亮状态背景色
      # vertical_inset: 0         # 垂直方向内缩量
      # horizontal_inset: 5      # 水平方向内缩量
    foreground:
      style: ""
      padding: 8  # 前景内容与背景边界的内边距
      font_size: 22
    action: undo

  # 右侧按钮列表（从右向左排列）
  buttons: [ *hide, *bqfh3, *clip, *layout, *redo, *undo ]

#键盘布局
preset_keyboards:
  default:
    ascii_mode: 0
    author: "暖暖"
    keys:
      - {click: q, long_click: 1}
      - {click: w, long_click: 2}
      - {click: e, long_click: 3}
      - {click: r, long_click: 4}
      - {click: t, long_click: 5}
      - {click: y, long_click: 6}
      - {click: u, long_click: 7}
      - {click: i, long_click: 8}
      - {click: o, long_click: 9}
      - {click: p, long_click: 0}
      - {width: 5}
      - {click: a, long_click: select_all}
      - {click: s, long_click: "@"}
      - {click: d, long_click: "#"}
      - {click: f, long_click: "{}{Left}"}
      - {click: g, long_click: "%", swipe_down: date_time}
      - {click: h, long_click: '"'}
      - {click: j, long_click: "'"}
      - {click: k, long_click: "[]{Left}"}
      - {click: l, long_click: "(){Left}", swipe_down: "="}
      - {width: 5}
      - {click: Shift_L, long_click: Shift_L, label_symbol: ' ', lazy_double_click: Keyboard_letter, composing: delimiter, width: 12}
      - {click: z, long_click: "`", width: 11}
      - {click: x, long_click: cut}
      - {click: c, long_click: copy}
      - {click: v, long_click: paste, width: 11}
      - {click: b, long_click: ":"}
      - {click: n, long_click: ";"}
      - {click: m, long_click: "_", width: 11}
      - {click: BackSpace, swipe_up: Escape, swipe_down: Delete, swipe_left: Clear, width: 15}
      - {click: Keyboard_number, popup: [CALCULATOR, Netdisk, TrimeWiki, Nightly, TrimeApp, MT, File_explorer, Weixin, Alipay, Jingdong, Meituan, Eleme, Hand_writing, Notes, Bing], composing: Pin, width: 15}
      - {click: ",", label: " ，️", swipe_up: "?", composing: 2, popup: [Pin, Reset], width: 12}
      - {click: space, label_symbol: 中, key_symbol_offset_x: 75, swipe_up: Up, swipe_down: Down, swipe_left: Left, swipe_right: Right, width: 46}
      - {click: ".", label: " 。", swipe_up: "!", composing: 3, popup: [Forward, Backward], width: 12}
      - {click: Return, popup: [Theme_settings, set_color_default, set_color_glass, set_theme], key_back_color: rbc, hilited_key_back_color: rhbc, key_text_color: rtc, hilited_key_text_color: rhtc, width: 15}
    name: "26键默认布局"
    lock: true
    width: 10

  letter:
    ascii_mode: 1
    lock: false
    __include: /preset_keyboards/default
    __patch: 
      "keys/@21/lazy_double_click": Keyboard_last_lock
      "keys/@32/label_symbol": "\uE073"

  wubi86_double_key:
    ascii_mode: 0
    ascii_keyboard: letter
    author: "讲文明"
    height: 40
    key_symbol_offset_x: 24
    label_transform: uppercase  #大写标签 小写none
    keys: 
      #第一行
      - {click: q, label: "Q   W", long_click: "_", swipe_right: w, swipe_down: 1, key_text_size: 22}
      - {click: e, label: "E   R", long_click: "～", swipe_right: r, swipe_down: 2, key_text_size: 22}
      - {click: t, label: "T   Y", long_click: "…", swipe_up: Time, swipe_right: y, swipe_down: 3, key_text_size: 22}
      - {click: u, label: "U   I", long_click: ":", swipe_right: i, swipe_down: 4, key_text_size: 22}
      - {click: o, label: "O   P", long_click: "、", swipe_right: p, swipe_down: 5, key_text_size: 22}
      #第二行
      - {width: 5}
      - {click: a, label: "A   S", long_click: "(){Left}", swipe_right: s, swipe_down: 6, width: 18, key_text_size: 22}
      - {click: d, label: "D   F", long_click: "@", swipe_up: Date, swipe_right: f, swipe_down: 7, width: 18, key_text_size: 22}
      - {click: g, label: "G   H", long_click: '"', swipe_right: h, swipe_down: 8, width: 18, key_text_size: 22}
      - {click: j, label: "J   K", long_click: "/", swipe_up: ChineseDate, swipe_right: k, swipe_down: 9, width: 18, key_text_size: 22}
      - {click: l, long_click: "#", swipe_up: Ⅰ, swipe_down: 0, width: 17, key_text_size: 22}
      - {width: 6}
      #第三行
      - {click: Shift_L, long_click: Shift_L, double_click: Keyboard_letter, label_symbol: ' ', composing: delimiter, swipe_up: RepeatCommit, swipe_down: Tab, width: 14}
      - {click: x, label: "Z   X", long_click: cut, swipe_left: z, swipe_up: select_cut, width: 18, key_text_size: 22}
      - {click: c, label: "C   V", long_click: copy, swipe_up: select_copy, swipe_right: v, width: 18, key_text_size: 22}
      - {click: b, label: "B   N", long_click: paste, swipe_up: clipboard_window, swipe_right: n, width: 18, key_text_size: 22}
      - {click: m, long_click: select_all, swipe_up: Ⅱ, width: 16, key_text_size: 22, key_symbol_offset_x: 21}
      - {click: BackSpace, swipe_up: Escape, swipe_down: Delete, swipe_left: Clear, width: 16}
      #第四行
      - {click: Keyboard_number, composing: 4, popup: [CALCULATOR, Netdisk, TrimeWiki, Nightly, TrimeApp, MT, File_explorer, Weixin, Alipay, Jingdong, Meituan, Eleme, Hand_writing, Notes, Bing], width: 14, key_text_size: 19}
      - {click: ",", label: " ，️", swipe_up: "?", composing: 3, popup: [Pin, Reset], width: 14, key_text_size: 19}
      - {click: space, width: 42}
      - {click: ".", label: " 。", swipe_up: "!", composing: 2, popup: [Forward, Backward], width: 14, key_text_size: 19}
      - {click: Return, popup: [Theme_settings, set_color_default, set_color_glass, set_theme], key_back_color: rbc, hilited_key_back_color: rhbc, key_text_color: rtc, hilited_key_text_color: rhtc, width: 16}
    lock: true
    name: "五笔86双键"
    width: 20

  pinyin_jiugong:
    ascii_mode: 0
    ascii_keyboard: letter
    author: "Uncle光 <467896722@qq.com>"
    height: 40
    key_symbol_offset_x: 30
    keys:
      #第一行
      - {click: ";", long_click: "[", width: 17, key_symbol_offset_x: 20}
      - {click: 1, label: "分词", long_click: "]", composing: delimiter}
      - {click: 2, label: abc, long_click: "'", key_text_size: 19}
      - {click: 3, label: def, long_click: "`", key_text_size: 19}
      - {click: Mode_switch0, composing: Escape, popup: [CALCULATOR, Netdisk, TrimeWiki, Nightly, TrimeApp, MT, File_explorer, Weixin, Alipay, Jingdong, Meituan, Eleme, Hand_writing, Notes, Bing], swipe_down: Shift_L, width: 17}
      #第二行
      - {click: "-", long_click: "=", width: 17, key_symbol_offset_x: 20}
      - {click: 4, label: ghi, long_click: Home, key_text_size: 19}
      - {click: 5, label: jkl, long_click: select_all, key_text_size: 19}
      - {click: 6, label: mno, long_click: End, key_text_size: 19}
      - {click: Keyboard_letter, width: 17, key_text_size: 19}
      #第三行
      - {click: "/", long_click: "\\", width: 17, key_symbol_offset_x: 20}
      - {click: 7, label: pqrs, long_click: copy, key_text_size: 19}
      - {click: 8, label: tuv, long_click: paste, key_text_size: 19}
      - {click: 9, label: wxyz, long_click: cut, key_text_size: 19}
      - {click: BackSpace, swipe_up: Escape, swipe_down: Delete, swipe_left: Clear, width: 17}
      #第四行
      - {click: ",", label: " ，️", popup: [Pin, Reset], swipe_up: "?", width: 17}
      - {click: ".", label: " 。", popup: [Forward, Backward], swipe_up: "!"}
      - {click: space, swipe_up: Up, swipe_down: Down, key_text_size: 15}
      - {click: 0, popup: ["{}{Left}", "(){Left}", "[]{Left}"]}
      - {click: Return, popup: [Theme_settings, set_color_default, set_color_glass, set_theme], key_back_color: rbc, hilited_key_back_color: rhbc, key_text_color: rtc, hilited_key_text_color: rhtc, width: 17}
    lock: true
    name: "拼音九宫"
    width: 22

  number:
    ascii_mode: 1
    lock: false
    name: "数字"
    __include: /preset_keyboards/pinyin_jiugong
    __patch: 
      "keys/@2/key_text_size": ～
      "keys/@3/key_text_size": ～
      "keys/@6/key_text_size": ～
      "keys/@7/key_text_size": ～
      "keys/@8/key_text_size": ～
      "keys/@11/key_text_size": ～
      "keys/@12/key_text_size": ～
      "keys/@13/key_text_size": ～
      "keys/@4": 
        click: Shift_L
        long_click: Shift_L
        label_symbol: " "
        width: 17
      "keys/@15":
